<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDNS Server - Login</title>
    <link rel="stylesheet" href="/static/retro.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-window {
            width: 100%;
            max-width: 420px;
        }

        .login-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-blue);
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
        }

        .window-content {
            min-height: 200px;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 24px;
        }

        @media (max-width: 480px) {
            .login-window {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="login-window window">
        <div class="window-titlebar">
            <span>🔐</span>
            <span>DDNS Server - Administrator Login</span>
        </div>
        
        <div class="window-content">
            <div class="text-center mb-24">
                <div class="login-icon">🌐</div>
                <h2>Enter Password</h2>
                <p style="color: #808080; margin-top: 8px;">Please log in to access the admin dashboard</p>
            </div>
            
            {% if error %}
            <div class="alert alert-error mb-16">
                Invalid password. Access denied.
            </div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="password">Admin Password:</label>
                    <input type="password" id="password" name="password" required autofocus aria-label="Admin Password">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">OK</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
