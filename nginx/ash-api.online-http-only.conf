# Simplified HTTP-only configuration (no SSL)
# Use this if you don't want HTTPS or are testing locally

server {
    listen 80;
    listen [::]:80;
    server_name ash-api.online *.ash-api.online;

    # Logging
    access_log /var/log/nginx/ddns-access.log;
    error_log /var/log/nginx/ddns-error.log;

    # Client max body size
    client_max_body_size 10M;

    # Proxy settings
    location / {
        proxy_pass http://127.0.0.1:8181;
        proxy_http_version 1.1;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for real-time responses
        proxy_buffering off;
    }

    # Static files
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8181;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
